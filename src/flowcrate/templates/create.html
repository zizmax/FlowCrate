{% extends "base.html" %}
{% block title %}Create - Flow Crate{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Create</h1>
  <p class="muted">Paste one or more Flow State post URLs. Preview resolves matches before any Spotify changes are made.</p>

  <form action="{{ url_for('preview') }}" method="post" class="stack">
    <label>
      Source
      <select name="source_preset" id="source-preset">
        {% for value, label in source_presets %}
          <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label id="url-input">
      Flow State URLs
      <textarea name="urls" rows="9" placeholder="https://www.flowstate.fm/p/flow-state-episode-324"></textarea>
    </label>
    <label>
      Playlist title
      <input name="playlist_name" type="text" placeholder="Defaults to the selected Flow State post">
    </label>
    <label>
      Playlist description
      <textarea name="playlist_description" rows="3" placeholder="Defaults to a Flow State source summary"></textarea>
    </label>
    <fieldset class="segmented">
      <legend>Visibility</legend>
      <label>
        <input name="playlist_public" type="radio" value="private" checked>
        Private
      </label>
      <label>
        <input name="playlist_public" type="radio" value="public">
        Public
      </label>
    </fieldset>
    <button class="primary" type="submit">Preview</button>
  </form>
</section>
<script>
  const preset = document.getElementById("source-preset");
  const urlInput = document.getElementById("url-input");
  function syncPreset() {
    urlInput.classList.toggle("hidden", preset.value !== "paste");
  }
  preset.addEventListener("change", syncPreset);
  syncPreset();
</script>
{% endblock %}
