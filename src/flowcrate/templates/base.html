<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Flow Crate{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23fff2ee'/%3E%3Cpolygon points='16,5 27,10.5 16,16 5,10.5' fill='%23d99a86'/%3E%3Cpolygon points='5,10.5 16,16 16,27 5,21.5' fill='%23bd5842'/%3E%3Cpolygon points='16,16 27,10.5 27,21.5 16,27' fill='%238f3d2d'/%3E%3Cline x1='5' y1='14.2' x2='16' y2='19.7' stroke='%23fff2ee' stroke-width='1' opacity='0.55'/%3E%3Cline x1='5' y1='17.9' x2='16' y2='23.4' stroke='%23fff2ee' stroke-width='1' opacity='0.55'/%3E%3Cline x1='16' y1='19.7' x2='27' y2='14.2' stroke='%23fff2ee' stroke-width='1' opacity='0.35'/%3E%3Cline x1='16' y1='23.4' x2='27' y2='17.9' stroke='%23fff2ee' stroke-width='1' opacity='0.35'/%3E%3C/svg%3E">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">Flow Crate</a>
      <nav>
        <a href="{{ url_for('index') }}"{% if request.endpoint == 'index' %} class="active" aria-current="page"{% endif %}>Dashboard</a>
        <a href="{{ url_for('settings') }}"{% if request.endpoint == 'settings' %} class="active" aria-current="page"{% endif %}>Settings</a>
      </nav>
    </header>

    <main class="page">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flashes">
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">Flow Crate {{ version }}</footer>
  </body>
</html>
