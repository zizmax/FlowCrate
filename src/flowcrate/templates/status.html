{% extends "base.html" %}
{% block title %}Status - Flow Crate{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Status</h1>
  <table>
    <thead><tr><th>Check</th><th>Value</th><th>State</th></tr></thead>
    <tbody>
      {% for label, value, ok in checks %}
        <tr>
          <td>{{ label }}</td>
          <td><code>{{ value }}</code></td>
          <td>{% if ok %}<span class="badge FOUND">OK</span>{% else %}<span class="badge NOT_FOUND">Needs setup</span>{% endif %}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
